<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>juts trping</title>
    <script
      src="https://kit.fontawesome.com/661acc8356.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="play.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@3"></script>
  </head>
  <body>
    <div class="buttons" id="buttons">
      <button class="short" id="short">short</button>
      <button class="normal" id="normal">normal</button>
      <button class="long" id="long">long</button>
    </div>
    <div id="counter" class="counter">
      <div id="correct" class="correct"></div>
      <div id="incorrect" class="incorrect"></div>
      <div id="timer" class="timer"></div>
    </div>
    <div class="container" id="container">
      <div class="typeDisplay" id="typeDisplay"></div>
      <div class="charDisplay" id="charDisplay" contenteditable="true"></div>
    </div>
    <div class="others" id="others">
      <button id="restart" class="restart">
        <i class="fa-solid fa-arrows-rotate"></i>
      </button>
      <button id="write" class="write">
        <i class="fa-solid fa-pen"></i>
      </button>
      <button id="about" class="about">
        <i class="fa-solid fa-exclamation"></i>
      </button>
      <button id="color" class="color"></button>
      <button class="setting" id="setting"></button>
    </div>
    <div id="allresult" class="allresult">
      <div id="wpmdisplay" class="wpmdisplay">tps</div>
      <div id="wpm" class="wpm"></div>
      <div id="accdisplay" class="accdisplay">acc</div>
      <div id="acc" class="acc"></div>
      <div id="resultother" class="resultother">
        <div id="allinput" class="allinput">characters</div>
        <div id="allinputDisplay" class="allinputDisplay"></div>
        <div id="time" class="time">time</div>
        <div id="timeDisplay" class="timeDisplay"></div>
      </div>
       <canvas id="myChart"></canvas>
    <textarea
      class="typeInput"
      id="typeInput"
      autocomplete="off"
      autofocus
    ></textarea>
    <script src="play.js"></script>
  </body>
</html>
